meta:
  universe_name: health_care_only_v1
  version: 0.2
  description: >
    Single-sector health care universe for stat-arb / residual mean-reversion research.
    Covers pharmaceuticals, biotechnology, health care equipment, distributors,
    managed care, and life sciences tools. All names have 15+ years of trading history.
  timezone: America/New_York
  data_source: yfinance
  asset_class: equities
  currency: USD

loader_defaults:
  start_date: "1990-01-01"
  end_date: null
  interval: "1d"
  auto_adjust: true
  actions: true
  repair: true
  keepna: false
  threads: true

selection_policy:
  objective: >
    Large- and mid-cap U.S. health care names with broad representation across
    pharmaceuticals, biotech, equipment, distributors, managed care, and services.
    All names have 15+ years of trading history.
  criteria:
    - liquidity
    - history_length
    - sector_representativeness
  exclusions:
    - illiquid_names
    - highly_idiosyncratic_names
    - duplicate_membership_across_groups
    - names_with_less_than_15_years_history

hierarchy:
  root: us_equities

groups:
  us_equities:
    type: root
    label: "US Equities"
    children:
      - health_care

  health_care:
    type: sector
    label: "Health Care"
    proxy_etf: XLV
    benchmark: SPY
    risk_free: ^IRX
    parent: us_equities
    children: []
    members:
      - JNJ
      - PFE
      - MRK
      - LLY
      - BMY
      - AMGN
      - GILD
      - BIIB
      - ABT
      - MDT
      - SYK
      - BDX
      - BSX
      - ISRG
      - BAX
      - ZBH
      - UNH
      - CI
      - ELV
      - CVS
      - MCK
      - CAH
      - DHR
      - TMO
      - A

tickers:
  SPY:
    kind: benchmark_etf
    label: "SPDR S&P 500 ETF Trust"

  XLV:
    kind: sector_etf
    label: "Health Care Select Sector SPDR Fund"

  ^IRX:
    kind: risk_free_rate
    label: "13-Week Treasury Bill Yield"

  JNJ:  { kind: equity, label: "Johnson & Johnson", sector: health_care }
  PFE:  { kind: equity, label: "Pfizer", sector: health_care }
  MRK:  { kind: equity, label: "Merck", sector: health_care }
